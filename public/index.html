<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verifier - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://source.unsplash.com/random/1920x1080/?technology,abstract') no-repeat center center/cover;
            position: relative;
        }
        .login-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

    <div class="login-container">
        <div class="login-overlay"></div>
        <div class="glass-card p-5" style="width: 100%; max-width: 400px; z-index: 1;">
            <div class="text-center mb-4">
                <h2 class="gradient-text fw-bold">EmailVerifier</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" required placeholder="demo@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="demo123">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none;">
                    Sign In
                </button>
                <div class="text-center mt-3">
                    <small>Need an account? <a href="#" id="toggleRegister" class="text-decoration-none">Register</a></small>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="d-none">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" id="regName" required placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" id="regEmail" required placeholder="demo@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold" style="border: none;">
                    Register
                </button>
                <div class="text-center mt-3">
                    <small>Already have an account? <a href="#" id="toggleLogin" class="text-decoration-none">Sign In</a></small>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        document.getElementById('toggleRegister').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.add('d-none');
            registerForm.classList.remove('d-none');
        });

        document.getElementById('toggleLogin').addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.add('d-none');
            loginForm.classList.remove('d-none');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await axios.post('/api/auth/login', { email, password });
                localStorage.setItem('token', res.data.token);
                localStorage.setItem('user', JSON.stringify({ name: res.data.name, email: res.data.email }));
                window.location.href = '/dashboard.html';
            } catch (err) {
                showToast(err.response?.data?.message || 'Login failed', 'error');
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const res = await axios.post('/api/auth/register', { name, email, password });
                localStorage.setItem('token', res.data.token);
                localStorage.setItem('user', JSON.stringify({ name: res.data.name, email: res.data.email }));
                window.location.href = '/dashboard.html';
            } catch (err) {
                showToast(err.response?.data?.message || 'Registration failed', 'error');
            }
        });
    </script>
</body>
</html>
